name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test --verbosity normal

      - name: Publish
        run: |
          dotnet publish src/CloudPrint.Service/CloudPrint.Service.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

      - name: Package release
        run: |
          Copy-Item scripts/install.ps1 publish/
          Compress-Archive -Path publish/* -DestinationPath cloudprint-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cloudprint-win-x64.zip
            scripts/install.ps1
